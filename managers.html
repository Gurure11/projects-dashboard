<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Project Performance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
text-align:center;
}

.card h2{
margin:0;
font-size:28px;
}

.card p{
margin:5px 0 0;
color:#555;
}

.formBox{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

textarea{
height:100px;
resize:none;
}

button{
margin-top:25px;
width:100%;
padding:12px;
background:#2b7cff;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1d5fd4;
}

.variance{
background:#f1f5ff;
padding:10px;
border-radius:6px;
margin-top:5px;
font-weight:bold;
}

#status{
margin-top:15px;
text-align:center;
font-weight:bold;
}

.chartBox{
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

</style>
</head>

<body>

<div class="container">

<h1>Daily Project Performance Dashboard</h1>

<div class="dashboard">

<div class="card">
<h2 id="kpiTarget">R0</h2>
<p>Total Target</p>
</div>

<div class="card">
<h2 id="kpiIncome">R0</h2>
<p>Total Income</p>
</div>

<div class="card">
<h2 id="kpiVariance">0%</h2>
<p>Variance</p>
</div>

</div>

<div class="formBox">

<form id="projectForm">

<label>Date</label>
<input type="date" id="date" required>

<label>Project Manager</label>
<input type="text" id="manager" required>

<label>Project Name</label>
<input type="text" id="project" required>

<label>Cost Center</label>
<select id="costcenter" required>

<option value="">Select Cost Center</option>
<option>Onpoint Group HQ</option>
<option>DI Solutions</option>
<option>Aqua Telecoms</option>
<option>Nkanyezi Projects</option>
<option>Onpoint Ontime Solutions</option>

</select>

<label>Daily Target (R)</label>
<input type="number" id="target" required>

<label>Daily Income (R)</label>
<input type="number" id="income" required oninput="calculateVariance()">

<label>Variance (%)</label>
<div class="variance" id="varianceDisplay">0%</div>

<label>Daily Summary</label>
<textarea id="summary"></textarea>

<label>Image Links</label>
<input type="text" id="images" placeholder="comma separated links">

<label>User Email</label>
<input type="email" id="email">

<button type="submit">Submit Report</button>

</form>

<div id="status"></div>

</div>

<div class="chartBox">
<canvas id="performanceChart"></canvas>
</div>

</div>

<script>

const scriptURL="YOUR_SCRIPT_URL"

let totalTarget=0
let totalIncome=0

const ctx=document.getElementById("performanceChart").getContext("2d")

const chart=new Chart(ctx,{
type:"bar",
data:{
labels:["Target","Income"],
datasets:[{
label:"Daily Performance",
data:[0,0]
}]
}
})

function calculateVariance(){

let target=parseFloat(document.getElementById("target").value)||0
let income=parseFloat(document.getElementById("income").value)||0

let variance=0

if(target>0){
variance=((income-target)/target)*100
}

variance=variance.toFixed(2)

document.getElementById("varianceDisplay").innerText=variance+"%"

}

document.getElementById("projectForm").addEventListener("submit",function(e){

e.preventDefault()

let target=parseFloat(document.getElementById("target").value)||0
let income=parseFloat(document.getElementById("income").value)||0

let variance=0

if(target>0){
variance=((income-target)/target)*100
}

variance=variance.toFixed(2)

let data={

Date:document.getElementById("date").value,

ProjectManager:document.getElementById("manager").value,

ProjectName:document.getElementById("project").value,

CostCenter:document.getElementById("costcenter").value,

DailyTarget:target,

DailyIncome:income,

Variance:variance,

DailySummary:document.getElementById("summary").value,

ImageLinks:document.getElementById("images").value,

SubmissionTimestamp:new Date().toISOString(),

UserEmail:document.getElementById("email").value

}

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(response=>{

document.getElementById("status").innerText="Report Submitted Successfully"

totalTarget+=target
totalIncome+=income

let totalVariance=0

if(totalTarget>0){
totalVariance=((totalIncome-totalTarget)/totalTarget)*100
}

document.getElementById("kpiTarget").innerText="R"+totalTarget
document.getElementById("kpiIncome").innerText="R"+totalIncome
document.getElementById("kpiVariance").innerText=totalVariance.toFixed(2)+"%"

chart.data.datasets[0].data=[target,income]
chart.update()

document.getElementById("projectForm").reset()
document.getElementById("varianceDisplay").innerText="0%"

})
.catch(err=>{

document.getElementById("status").innerText="Submission Failed"

})

})

</script>

</body>
</html>
