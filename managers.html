<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Project Performance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#1f2937;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:1300px;
margin:auto;
padding:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
color:#555;
}

.card h1{
margin-top:10px;
}

.filters{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

select,input,button{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

th{
background:#f1f5f9;
}

.form-box{
margin-top:40px;
background:white;
padding:20px;
border-radius:10px;
}

.form-box input{
width:100%;
margin-bottom:10px;
}

</style>

</head>

<body>

<header>
<h1>Project Performance Dashboard</h1>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>Total Records</h3>
<h1 id="totalRecords">0</h1>
</div>

<div class="card">
<h3>Total Income</h3>
<h1 id="totalIncome">0</h1>
</div>

<div class="card">
<h3>Total Target</h3>
<h1 id="totalTarget">0</h1>
</div>

<div class="card">
<h3>Average Variance</h3>
<h1 id="avgVariance">0%</h1>
</div>

</div>


<div class="filters">

<select id="managerFilter">
<option value="all">All Managers</option>
</select>

<input type="date" id="startDate">
<input type="date" id="endDate">

<button onclick="loadRecords()">Apply Filters</button>

</div>


<canvas id="incomeChart" height="90"></canvas>

<br><br>

<table>

<thead>
<tr>
<th>Date</th>
<th>Manager</th>
<th>Project</th>
<th>Cost Center</th>
<th>Target</th>
<th>Income</th>
<th>Variance</th>
<th>Summary</th>
<th>Images</th>
</tr>
</thead>

<tbody id="recordsTable"></tbody>

</table>


<div class="form-box">

<h2>Submit Daily Report</h2>

<input id="date" type="date">

<input id="manager" placeholder="Project Manager">

<input id="project" placeholder="Project Name">

<input id="costcenter" placeholder="Cost Center">

<input id="target" placeholder="Daily Target">

<input id="income" placeholder="Daily Income">

<input id="summary" placeholder="Daily Summary">

<input id="images" placeholder="Image Link">

<button onclick="submitRecord()">Submit Report</button>

</div>

</div>



<script>

const API="https://script.google.com/macros/s/AKfycbxQHSAcsmsXiTe1e3AGRJQuOFCMp-r5upjqOemSx729jl4BE_qhKoFiOfQtFBZxeHVgfA/exec";

let chart;


// LOAD STATS

async function loadStats(){

const res = await fetch(API+"?action=getStats");
const data = await res.json();

document.getElementById("totalRecords").innerText=data.totalRecords;
document.getElementById("totalIncome").innerText="R "+data.totalIncome;
document.getElementById("totalTarget").innerText="R "+data.totalTarget;
document.getElementById("avgVariance").innerText=data.averageVariance.toFixed(2)+"%";

}



// LOAD MANAGERS

async function loadManagers(){

const res = await fetch(API+"?action=getManagers");
const data = await res.json();

const select=document.getElementById("managerFilter");

data.data.forEach(m=>{

const opt=document.createElement("option");
opt.value=m;
opt.textContent=m;

select.appendChild(opt);

});

}



// LOAD RECORDS

async function loadRecords(){

let url=API+"?action=getRecords";

const manager=document.getElementById("managerFilter").value;
const start=document.getElementById("startDate").value;
const end=document.getElementById("endDate").value;

if(manager!="all") url+="&manager="+manager;
if(start) url+="&startDate="+start;
if(end) url+="&endDate="+end;

const res=await fetch(url);
const data=await res.json();

const table=document.getElementById("recordsTable");

table.innerHTML="";

const labels=[];
const income=[];

data.data.forEach(r=>{

labels.push(r.date);
income.push(r.dailyIncome);

const row=document.createElement("tr");

row.innerHTML=`

<td>${r.date}</td>
<td>${r.projectManager}</td>
<td>${r.projectName}</td>
<td>${r.costCenter}</td>
<td>R ${r.dailyTarget}</td>
<td>R ${r.dailyIncome}</td>
<td>${r.variance.toFixed(2)}%</td>
<td>${r.summary}</td>
<td><a href="${r.imageLinks}" target="_blank">View</a></td>

`;

table.appendChild(row);

});

drawChart(labels,income);

}



// DRAW CHART

function drawChart(labels,data){

if(chart) chart.destroy();

const ctx=document.getElementById("incomeChart");

chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Daily Income",
data:data,
fill:false,
tension:0.3
}]
}
});

}



// SUBMIT RECORD

async function submitRecord(){

const date=document.getElementById("date").value;
const manager=document.getElementById("manager").value;
const project=document.getElementById("project").value;
const costcenter=document.getElementById("costcenter").value;
const target=document.getElementById("target").value;
const income=document.getElementById("income").value;
const summary=document.getElementById("summary").value;
const images=document.getElementById("images").value;

const url=

API+
"?action=submit"+
"&date="+encodeURIComponent(date)+
"&manager="+encodeURIComponent(manager)+
"&project="+encodeURIComponent(project)+
"&costcenter="+encodeURIComponent(costcenter)+
"&target="+target+
"&income="+income+
"&summary="+encodeURIComponent(summary)+
"&images="+encodeURIComponent(images);

await fetch(url);

alert("Report Submitted");

loadRecords();
loadStats();

}



// INITIAL LOAD

loadStats();
loadManagers();
loadRecords();

</script>

</body>
</html>
