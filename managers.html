<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Onpoint Group Project Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
}

header{
background:#0d2b52;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
}

.container{
padding:30px;
max-width:1200px;
margin:auto;
}

.cardGrid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
text-align:center;
}

.formBox{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
margin-bottom:30px;
}

label{
font-weight:bold;
display:block;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:6px;
}

textarea{
height:80px;
}

button{
margin-top:15px;
padding:12px;
background:#1c6ef2;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
width:100%;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:30px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#0d2b52;
color:white;
}

.loginBox{
max-width:400px;
margin:100px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<!-- LOGIN SCREEN -->

<div id="loginScreen" class="loginBox">

<h2>Onpoint Group Login</h2>

<label>Email</label>
<input type="email" id="loginEmail">

<label>Password</label>
<input type="password" id="loginPassword">

<button onclick="login()">Login</button>

<p id="loginStatus"></p>

</div>


<!-- MAIN DASHBOARD -->

<div id="dashboard" style="display:none;">

<header>

<h1>Onpoint Group Project Dashboard</h1>

<div>
Logged in as: <b id="userEmail"></b>
</div>

</header>

<div class="container">


<!-- KPI CARDS -->

<div class="cardGrid">

<div class="card">
<h2 id="totalTarget">R0</h2>
<p>Total Target</p>
</div>

<div class="card">
<h2 id="totalIncome">R0</h2>
<p>Total Income</p>
</div>

<div class="card">
<h2 id="totalVariance">0%</h2>
<p>Overall Variance</p>
</div>

</div>


<!-- FORM -->

<div class="formBox">

<h3>Submit Daily Project Report</h3>

<label>Date</label>
<input type="date" id="date">

<label>Project Manager</label>
<input type="text" id="manager">

<label>Project Name</label>
<input type="text" id="project">

<label>Cost Center</label>
<select id="costcenter">

<option>Onpoint Group HQ</option>
<option>DI Solutions</option>
<option>Aqua Telecoms</option>
<option>Nkanyezi Projects</option>
<option>Onpoint Ontime Solutions</option>

</select>

<label>Daily Target (R)</label>
<input type="number" id="target">

<label>Daily Income (R)</label>
<input type="number" id="income" oninput="calculateVariance()">

<label>Variance (%)</label>
<input type="text" id="variance" readonly>

<label>Daily Summary</label>
<textarea id="summary"></textarea>

<label>Image Links</label>
<input type="text" id="images">

<button onclick="submitReport()">Submit Report</button>

<p id="status"></p>

</div>


<!-- PERFORMANCE FILTER -->

<label>Performance Range</label>

<select id="rangeFilter" onchange="loadPerformance()">
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="monthly">Monthly</option>
<option value="yearly">Yearly</option>
</select>


<!-- PERFORMANCE TABLE -->

<table>

<thead>

<tr>

<th>Project Manager</th>
<th>Variance %</th>
<th>Target</th>
<th>Income</th>

</tr>

</thead>

<tbody id="performanceTable"></tbody>

</table>


<!-- CHART -->

<canvas id="chart" style="margin-top:40px"></canvas>


</div>

</div>


<script>


/* ================================
CONFIGURATION
================================ */

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQHSAcsmsXiTe1e3AGRJQuOFCMp-r5upjqOemSx729jl4BE_qhKoFiOfQtFBZxeHVgfA/exec";

const SHEET_ID = "1ToKQ3MDSUZl3T-t-_tMFkH5LXUwlMgrgDFRfBeLqK0o";


/* ================================
LOGIN
================================ */

function login(){

let email=document.getElementById("loginEmail").value

if(email==""){

document.getElementById("loginStatus").innerText="Enter email"

return

}

document.getElementById("loginScreen").style.display="none"
document.getElementById("dashboard").style.display="block"

document.getElementById("userEmail").innerText=email

}


/* ================================
VARIANCE CALCULATION
================================ */

function calculateVariance(){

let target=parseFloat(document.getElementById("target").value)||0
let income=parseFloat(document.getElementById("income").value)||0

let variance=0

if(target>0){

variance=((income-target)/target)*100

}

document.getElementById("variance").value=variance.toFixed(2)

}


/* ================================
SUBMIT REPORT
================================ */

function submitReport(){

let data={

Date:document.getElementById("date").value,

ProjectManager:document.getElementById("manager").value,

ProjectName:document.getElementById("project").value,

CostCenter:document.getElementById("costcenter").value,

DailyTarget:document.getElementById("target").value,

DailyIncome:document.getElementById("income").value,

Variance:document.getElementById("variance").value,

DailySummary:document.getElementById("summary").value,

ImageLinks:document.getElementById("images").value,

SubmissionTimestamp:new Date().toISOString(),

UserEmail:document.getElementById("userEmail").innerText

}

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.text())
.then(res=>{

document.getElementById("status").innerText="Report Submitted Successfully"

})


}


/* ================================
LOAD PERFORMANCE
================================ */

function loadPerformance(){

let range=document.getElementById("rangeFilter").value

fetch(SCRIPT_URL+"?action=getPerformance&range="+range)

.then(r=>r.json())

.then(data=>{

let table=""

data.forEach(row=>{

table+=`
<tr>
<td>${row.manager}</td>
<td>${row.variance}%</td>
<td>R${row.target}</td>
<td>R${row.income}</td>
</tr>
`

})

document.getElementById("performanceTable").innerHTML=table

})

}


/* ================================
CHART
================================ */

const ctx=document.getElementById("chart").getContext("2d")

new Chart(ctx,{
type:"bar",
data:{
labels:["Target","Income"],
datasets:[{
label:"Performance",
data:[0,0]
}]
}
})


</script>

</body>
</html>
