<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onpoint Group HQ - Analytics Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-container img {
            height: 50px;
            width: auto;
        }

        .logo-container h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date-range-picker {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f8f9fa;
            padding: 10px 20px;
            border-radius: 12px;
        }

        .date-range-picker input {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            transition: transform 0.3s ease;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
        }

        /* KPI Cards */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .kpi-card:hover {
            transform: translateY(-5px);
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea20, #764ba220);
            border-radius: 50%;
            transform: translate(30px, -30px);
        }

        .kpi-icon {
            font-size: 30px;
            color: #667eea;
            margin-bottom: 15px;
        }

        .kpi-label {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .kpi-trend {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .trend-up { color: #43e97b; }
        .trend-down { color: #fa709a; }

        /* Charts Row */
        .charts-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chart-header h3 {
            color: #333;
            font-size: 18px;
        }

        .chart-actions {
            display: flex;
            gap: 10px;
        }

        .chart-actions button {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }

        /* Projects Comparison Table */
        .comparison-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-header h2 {
            color: #333;
            font-size: 22px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-success {
            background: #43e97b;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f8f9fa;
            padding: 8px 15px;
            border-radius: 10px;
        }

        .filter-group select, .filter-group input {
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            background: white;
        }

        .table-container {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .progress-cell {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar-small {
            width: 100px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-on-track {
            background: #43e97b20;
            color: #43e97b;
        }

        .status-at-risk {
            background: #fa709a20;
            color: #fa709a;
        }

        .status-completed {
            background: #667eea20;
            color: #667eea;
        }

        /* Analytics Row */
        .analytics-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .analytics-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .analytics-card h4 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .metric-list {
            list-style: none;
        }

        .metric-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .metric-label {
            color: #666;
        }

        .metric-value {
            font-weight: 600;
            color: #333;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Notifications */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            background: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1001;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success { border-left: 4px solid #43e97b; }
        .notification.error { border-left: 4px solid #fa709a; }
        .notification.info { border-left: 4px solid #667eea; }

        @media (max-width: 768px) {
            .charts-row {
                grid-template-columns: 1fr;
            }
            
            .header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .date-range-picker {
                width: 100%;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Loading Overlay -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
        </div>

        <!-- Notification -->
        <div class="notification" id="notification">
            <i class="fas fa-check-circle" id="notificationIcon"></i>
            <span id="notificationMessage">Notification message</span>
        </div>

        <!-- Header -->
        <div class="header">
            <div class="logo-container">
                <img src="logo.png" alt="Onpoint Group Logo" onerror="this.style.display='none'">
                <h1><i class="fas fa-chart-pie"></i> Onpoint Group HQ</h1>
            </div>
            <div class="date-range-picker">
                <i class="fas fa-calendar-alt" style="color: #667eea;"></i>
                <input type="date" id="startDate" value="">
                <span>to</span>
                <input type="date" id="endDate" value="">
                <button class="refresh-btn" onclick="loadDashboardData()">
                    <i class="fas fa-sync-alt"></i> Update
                </button>
            </div>
        </div>

        <!-- KPI Cards -->
        <div class="kpi-grid" id="kpiCards">
            <!-- Dynamically populated -->
        </div>

        <!-- Charts Row -->
        <div class="charts-row">
            <div class="chart-card">
                <div class="chart-header">
                    <h3><i class="fas fa-chart-line"></i> Project Progress Overview</h3>
                    <div class="chart-actions">
                        <button onclick="exportChart('progressChart', 'Progress Overview')"><i class="fas fa-download"></i></button>
                    </div>
                </div>
                <canvas id="progressChart"></canvas>
            </div>
            <div class="chart-card">
                <div class="chart-header">
                    <h3><i class="fas fa-chart-bar"></i> Financial Performance</h3>
                    <div class="chart-actions">
                        <button onclick="exportChart('financialChart', 'Financial Performance')"><i class="fas fa-download"></i></button>
                    </div>
                </div>
                <canvas id="financialChart"></canvas>
            </div>
        </div>

        <!-- Analytics Row -->
        <div class="analytics-row">
            <div class="analytics-card">
                <h4><i class="fas fa-tag"></i> By Cost Center</h4>
                <div class="metric-list" id="costCenterStats">
                    <!-- Populated dynamically -->
                </div>
            </div>
            <div class="analytics-card">
                <h4><i class="fas fa-exclamation-triangle"></i> Risk Distribution</h4>
                <div class="metric-list" id="riskStats">
                    <!-- Populated dynamically -->
                </div>
            </div>
            <div class="analytics-card">
                <h4><i class="fas fa-clock"></i> Schedule Health</h4>
                <div class="metric-list" id="scheduleStats">
                    <!-- Populated dynamically -->
                </div>
            </div>
        </div>

        <!-- Projects Comparison Section -->
        <div class="comparison-section">
            <div class="section-header">
                <h2><i class="fas fa-project-diagram"></i> Projects Comparison Dashboard</h2>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="exportToExcel()">
                        <i class="fas fa-file-excel"></i> Export Excel
                    </button>
                    <button class="btn btn-primary" onclick="generatePDF()">
                        <i class="fas fa-file-pdf"></i> Generate PDF Report
                    </button>
                </div>
            </div>

            <!-- Filters -->
            <div class="filter-bar">
                <div class="filter-group">
                    <i class="fas fa-filter" style="color: #667eea;"></i>
                    <select id="costCenterFilter" onchange="filterProjects()">
                        <option value="all">All Cost Centers</option>
                        <option value="HQ">Onpoint Group HQ</option>
                        <option value="DI">DI Solutions</option>
                        <option value="AQUA">Aqua Telecoms</option>
                        <option value="NKANYEZI">Nkanyezi Projects</option>
                        <option value="ONTIME">Onpoint Ontime Solution</option>
                    </select>
                </div>
                <div class="filter-group">
                    <i class="fas fa-tasks" style="color: #667eea;"></i>
                    <select id="statusFilter" onchange="filterProjects()">
                        <option value="all">All Statuses</option>
                        <option value="On Track">On Track</option>
                        <option value="At Risk">At Risk</option>
                        <option value="Behind Schedule">Behind Schedule</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
                <div class="filter-group">
                    <i class="fas fa-search" style="color: #667eea;"></i>
                    <input type="text" id="searchFilter" placeholder="Search projects..." onkeyup="filterProjects()">
                </div>
            </div>

            <!-- Projects Table -->
            <div class="table-container">
                <table id="projectsTable">
                    <thead>
                        <tr>
                            <th>Project ID</th>
                            <th>Project Name</th>
                            <th>Cost Center</th>
                            <th>Supervisor</th>
                            <th>Start Date</th>
                            <th>End Date</th>
                            <th>Progress</th>
                            <th>Daily P/L</th>
                            <th>Budget Util.</th>
                            <th>Status</th>
                            <th>Risk Level</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Populated dynamically -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            GOOGLE_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyp9YMLdXLOig0VCqTuRNQAunH6Cj4Dg6E3zPXR8VIsWieZBQGkgTFneLP7bKmhO_S8/exec',
            SHEET_NAME: 'Project Manager'
        };

        // Global variables
        let allProjects = [];
        let filteredProjects = [];
        let progressChart, financialChart;

        // Initialize
        window.onload = function() {
            setDefaultDates();
            loadDashboardData();
        };

        function setDefaultDates() {
            const today = new Date();
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
            const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
            
            document.getElementById('startDate').value = firstDay.toISOString().split('T')[0];
            document.getElementById('endDate').value = lastDay.toISOString().split('T')[0];
        }

        // Show notification
        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            const icon = document.getElementById('notificationIcon');
            const messageEl = document.getElementById('notificationMessage');
            
            icon.className = type === 'success' ? 'fas fa-check-circle' : 
                            type === 'error' ? 'fas fa-exclamation-circle' : 
                            'fas fa-info-circle';
            
            notification.className = `notification ${type}`;
            messageEl.textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // Show/hide loading
        function setLoading(show) {
            document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
        }

        // Format currency
        function formatZAR(number) {
            return 'R ' + Number(number).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        // Format percentage
        function formatPercent(number) {
            return Number(number).toFixed(1) + '%';
        }

        // Load dashboard data
        async function loadDashboardData() {
            setLoading(true);
            try {
                const response = await fetch(`${CONFIG.GOOGLE_SCRIPT_URL}?action=getProjects`);
                const data = await response.json();
                
                if (data.success) {
                    allProjects = data.data || [];
                    filteredProjects = [...allProjects];
                    updateDashboard();
                    showNotification('Dashboard updated successfully', 'success');
                } else {
                    throw new Error(data.error || 'Failed to load data');
                }
            } catch (error) {
                console.error('Error loading data:', error);
                showNotification('Error loading data: ' + error.message, 'error');
                // Load sample data for demonstration
                loadSampleData();
            } finally {
                setLoading(false);
            }
        }

        // Sample data for demonstration
        function loadSampleData() {
            allProjects = [
                {
                    ProjectID: 'PRJ-0001',
                    ProjectName: 'Network Infrastructure Upgrade',
                    CostCenter: 'AQUA',
                    Supervisor: 'John Smith',
                    StartDate: '2024-01-15',
                    EndDate: '2024-04-15',
                    ProgressPercentage: 75,
                    DailyProfit: 821.92,
                    BudgetUtilization: 68.5,
                    Status: 'At Risk',
                    RiskLevel: 'Medium',
                    TotalInvoiced: 500000,
                    TotalCosts: 350000
                },
                {
                    ProjectID: 'PRJ-0002',
                    ProjectName: 'Solar Installation Phase 2',
                    CostCenter: 'NKANYEZI',
                    Supervisor: 'Sarah Johnson',
                    StartDate: '2024-02-01',
                    EndDate: '2024-05-01',
                    ProgressPercentage: 90,
                    DailyProfit: 1234.56,
                    BudgetUtilization: 82.3,
                    Status: 'On Track',
                    RiskLevel: 'Low',
                    TotalInvoiced: 750000,
                    TotalCosts: 520000
                },
                {
                    ProjectID: 'PRJ-0003',
                    ProjectName: 'Fiber Optic Expansion',
                    CostCenter: 'DI',
                    Supervisor: 'Mike Peters',
                    StartDate: '2024-03-10',
                    EndDate: '2024-06-10',
                    ProgressPercentage: 45,
                    DailyProfit: 543.21,
                    BudgetUtilization: 38.7,
                    Status: 'Behind Schedule',
                    RiskLevel: 'High',
                    TotalInvoiced: 300000,
                    TotalCosts: 250000
                }
            ];
            filteredProjects = [...allProjects];
            updateDashboard();
            showNotification('Using sample data (offline mode)', 'info');
        }

        // Update all dashboard components
        function updateDashboard() {
            updateKPIs();
            updateCharts();
            updateAnalytics();
            renderProjectsTable();
        }

        // Update KPI cards
        function updateKPIs() {
            const totalProjects = allProjects.length;
            const activeProjects = allProjects.filter(p => p.Status !== 'Completed').length;
            const completedProjects = allProjects.filter(p => p.Status === 'Completed').length;
            const atRiskProjects = allProjects.filter(p => p.Status === 'At Risk' || p.Status === 'Behind Schedule').length;
            
            const totalValue = allProjects.reduce((sum, p) => sum + (parseFloat(p.TotalInvoiced) || 0), 0);
            const totalCosts = allProjects.reduce((sum, p) => sum + (parseFloat(p.TotalCosts) || 0), 0);
            const totalProfit = totalValue - totalCosts;
            
            const avgProgress = allProjects.reduce((sum, p) => sum + (parseFloat(p.ProgressPercentage) || 0), 0) / totalProjects || 0;

            const kpiHtml = `
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="kpi-label">Total Projects</div>
                    <div class="kpi-value">${totalProjects}</div>
                    <div class="kpi-trend"><span class="trend-up"><i class="fas fa-arrow-up"></i> Active: ${activeProjects}</span></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="kpi-label">Completed</div>
                    <div class="kpi-value">${completedProjects}</div>
                    <div class="kpi-trend"><span class="${atRiskProjects > 0 ? 'trend-down' : 'trend-up'}">At Risk: ${atRiskProjects}</span></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-coins"></i></div>
                    <div class="kpi-label">Total Value</div>
                    <div class="kpi-value">${formatZAR(totalValue)}</div>
                    <div class="kpi-trend">Profit: ${formatZAR(totalProfit)}</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon"><i class="fas fa-percent"></i></div>
                    <div class="kpi-label">Avg Progress</div>
                    <div class="kpi-value">${formatPercent(avgProgress)}</div>
                    <div class="kpi-trend">${avgProgress >= 70 ? 'On Track' : 'Behind'}</div>
                </div>
            `;
            
            document.getElementById('kpiCards').innerHTML = kpiHtml;
        }

        // Update charts
        function updateCharts() {
            // Progress Chart
            const ctx1 = document.getElementById('progressChart').getContext('2d');
            if (progressChart) progressChart.destroy();
            
            const projectNames = allProjects.map(p => p.ProjectName || 'Unnamed');
            const progressData = allProjects.map(p => parseFloat(p.ProgressPercentage) || 0);
            const budgetData = allProjects.map(p => parseFloat(p.BudgetUtilization) || 0);

            progressChart = new Chart(ctx1, {
                type: 'bar',
                data: {
                    labels: projectNames,
                    datasets: [
                        {
                            label: 'Progress %',
                            data: progressData,
                            backgroundColor: 'rgba(102, 126, 234, 0.8)',
                            borderRadius: 5
                        },
                        {
                            label: 'Budget Utilization %',
                            data: budgetData,
                            backgroundColor: 'rgba(67, 233, 123, 0.8)',
                            borderRadius: 5
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 100,
                            title: {
                                display: true,
                                text: 'Percentage (%)'
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });

            // Financial Chart
            const ctx2 = document.getElementById('financialChart').getContext('2d');
            if (financialChart) financialChart.destroy();

            const incomeData = allProjects.map(p => parseFloat(p.TotalInvoiced) || 0);
            const costsData = allProjects.map(p => parseFloat(p.TotalCosts) || 0);
            const profitData = allProjects.map(p => (parseFloat(p.TotalInvoiced) || 0) - (parseFloat(p.TotalCosts) || 0));

            financialChart = new Chart(ctx2, {
                type: 'line',
                data: {
                    labels: projectNames,
                    datasets: [
                        {
                            label: 'Income',
                            data: incomeData,
                            borderColor: '#667eea',
                            backgroundColor: 'rgba(102, 126, 234, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Costs',
                            data: costsData,
                            borderColor: '#fa709a',
                            backgroundColor: 'rgba(250, 112, 154, 0.1)',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Profit',
                            data: profitData,
                            borderColor: '#43e97b',
                            backgroundColor: 'rgba(67, 233, 123, 0.1)',
                            tension: 0.4,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function(value) {
                                    return 'R ' + value.toLocaleString();
                                }
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            position: 'bottom'
                        }
                    }
                }
            });
        }

        // Update analytics cards
        function updateAnalytics() {
            // Cost Center Stats
            const costCenters = {};
            allProjects.forEach(p => {
                const cc = p.CostCenter || 'Unknown';
                costCenters[cc] = (costCenters[cc] || 0) + 1;
            });
            
            let costCenterHtml = '';
            for (const [cc, count] of Object.entries(costCenters)) {
                costCenterHtml += `
                    <div class="metric-item">
                        <span class="metric-label">${cc}</span>
                        <span class="metric-value">${count} project${count !== 1 ? 's' : ''}</span>
                    </div>
                `;
            }
            document.getElementById('costCenterStats').innerHTML = costCenterHtml;

            // Risk Stats
            const riskLevels = { Low: 0, Medium: 0, High: 0 };
            allProjects.forEach(p => {
                const risk = p.RiskLevel || 'Low';
                riskLevels[risk] = (riskLevels[risk] || 0) + 1;
            });
            
            const riskHtml = `
                <div class="metric-item">
                    <span class="metric-label"><span style="color: #43e97b;">●</span> Low Risk</span>
                    <span class="metric-value">${riskLevels.Low}</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label"><span style="color: #fee140;">●</span> Medium Risk</span>
                    <span class="metric-value">${riskLevels.Medium}</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label"><span style="color: #fa709a;">●</span> High Risk</span>
                    <span class="metric-value">${riskLevels.High}</span>
                </div>
            `;
            document.getElementById('riskStats').innerHTML = riskHtml;

            // Schedule Stats
            const onTrack = allProjects.filter(p => p.Status === 'On Track').length;
            const atRisk = allProjects.filter(p => p.Status === 'At Risk').length;
            const behind = allProjects.filter(p => p.Status === 'Behind Schedule').length;
            
            const scheduleHtml = `
                <div class="metric-item">
                    <span class="metric-label"><i class="fas fa-check-circle" style="color: #43e97b;"></i> On Track</span>
                    <span class="metric-value">${onTrack}</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label"><i class="fas fa-exclamation-triangle" style="color: #fee140;"></i> At Risk</span>
                    <span class="metric-value">${atRisk}</span>
                </div>
                <div class="metric-item">
                    <span class="metric-label"><i class="fas fa-times-circle" style="color: #fa709a;"></i> Behind</span>
                    <span class="metric-value">${behind}</span>
                </div>
            `;
            document.getElementById('scheduleStats').innerHTML = scheduleHtml;
        }

        // Render projects table
        function renderProjectsTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            filteredProjects.forEach(project => {
                const row = tbody.insertRow();
                const progress = parseFloat(project.ProgressPercentage) || 0;
                const budgetUtil = parseFloat(project.BudgetUtilization) || 0;
                
                let statusClass = 'status-on-track';
                if (project.Status === 'At Risk' || project.Status === 'Behind Schedule') {
                    statusClass = 'status-at-risk';
                } else if (project.Status === 'Completed') {
                    statusClass = 'status-completed';
                }

                row.innerHTML = `
                    <td>${project.ProjectID || 'N/A'}</td>
                    <td><strong>${project.ProjectName || 'Unnamed'}</strong></td>
                    <td>${project.CostCenter || 'N/A'}</td>
                    <td>${project.Supervisor || 'Unassigned'}</td>
                    <td>${project.StartDate || 'Not set'}</td>
                    <td>${project.EndDate || 'Not set'}</td>
                    <td>
                        <div class="progress-cell">
                            <span>${formatPercent(progress)}</span>
                            <div class="progress-bar-small">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                        </div>
                    </td>
                    <td>${formatZAR(project.DailyProfit || 0)}</td>
                    <td>${formatPercent(budgetUtil)}</td>
                    <td><span class="status-badge ${statusClass}">${project.Status || 'Unknown'}</span></td>
                    <td><span class="status-badge" style="background: ${getRiskColor(project.RiskLevel)}20; color: ${getRiskColor(project.RiskLevel)}">${project.RiskLevel || 'Unknown'}</span></td>
                `;
            });
        }

        function getRiskColor(risk) {
            switch(risk) {
                case 'High': return '#fa709a';
                case 'Medium': return '#fee140';
                case 'Low': return '#43e97b';
                default: return '#667eea';
            }
        }

        // Filter projects
        function filterProjects() {
            const costCenter = document.getElementById('costCenterFilter').value;
            const status = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchFilter').value.toLowerCase();
            
            filteredProjects = allProjects.filter(project => {
                const matchesCost = costCenter === 'all' || project.CostCenter === costCenter;
                const matchesStatus = status === 'all' || project.Status === status;
                const matchesSearch = search === '' || 
                    (project.ProjectName && project.ProjectName.toLowerCase().includes(search)) ||
                    (project.ProjectID && project.ProjectID.toLowerCase().includes(search)) ||
                    (project.Supervisor && project.Supervisor.toLowerCase().includes(search));
                
                return matchesCost && matchesStatus && matchesSearch;
            });
            
            renderProjectsTable();
        }

        // Export chart as image
        function exportChart(chartId, filename) {
            const canvas = document.getElementById(chartId);
            const link = document.createElement('a');
            link.download = `${filename}_${new Date().toISOString().split('T')[0]}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        // Export to Excel (CSV)
        function exportToExcel() {
            const headers = ['Project ID', 'Project Name', 'Cost Center', 'Supervisor', 'Start Date', 'End Date', 'Progress %', 'Daily P/L', 'Budget Util %', 'Status', 'Risk Level'];
            const rows = filteredProjects.map(p => [
                p.ProjectID,
                p.ProjectName,
                p.CostCenter,
                p.Supervisor,
                p.StartDate,
                p.EndDate,
                p.ProgressPercentage,
                p.DailyProfit,
                p.BudgetUtilization,
                p.Status,
                p.RiskLevel
            ]);
            
            const csvContent = [headers, ...rows]
                .map(row => row.map(cell => `"${cell || ''}"`).join(','))
                .join('\n');
            
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `projects_export_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
            
            showNotification('Excel file downloaded', 'success');
        }

        // Generate PDF Report
        async function generatePDF() {
            setLoading(true);
            try {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('landscape', 'mm', 'a4');
                
                // Add title
                pdf.setFontSize(20);
                pdf.setTextColor(102, 126, 234);
                pdf.text('Onpoint Group HQ - Project Report', 20, 20);
                
                pdf.setFontSize(12);
                pdf.setTextColor(0, 0, 0);
                pdf.text(`Generated: ${new Date().toLocaleString()}`, 20, 30);
                
                // Add summary
                pdf.setFontSize(14);
                pdf.text('Executive Summary', 20, 45);
                
                pdf.setFontSize(10);
                const totalProjects = allProjects.length;
                const activeProjects = allProjects.filter(p => p.Status !== 'Completed').length;
                const totalValue = allProjects.reduce((sum, p) => sum + (parseFloat(p.TotalInvoiced) || 0), 0);
                
                pdf.text(`Total Projects: ${totalProjects}`, 20, 55);
                pdf.text(`Active Projects: ${activeProjects}`, 20, 62);
                pdf.text(`Total Portfolio Value: ${formatZAR(totalValue)}`, 20, 69);
                
                // Add table
                const headers = [['Project', 'Progress', 'Status', 'Daily P/L']];
                const data = filteredProjects.slice(0, 10).map(p => [
                    p.ProjectName || 'N/A',
                    `${p.ProgressPercentage || 0}%`,
                    p.Status || 'N/A',
                    formatZAR(p.DailyProfit || 0)
                ]);
                
                pdf.autoTable({
                    head: headers,
                    body: data,
                    startY: 80,
                    theme: 'striped',
                    headStyles: { fillColor: [102, 126, 234] }
                });
                
                // Save PDF
                pdf.save(`project_report_${new Date().toISOString().split('T')[0]}.pdf`);
                showNotification('PDF report generated successfully', 'success');
            } catch (error) {
                console.error('Error generating PDF:', error);
                showNotification('Error generating PDF: ' + error.message, 'error');
            } finally {
                setLoading(false);
            }
        }
    </script>
</body>
</html>
